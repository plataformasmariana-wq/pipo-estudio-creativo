<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIPO Estudio Creativo</title>

<style>
body {
    font-family: Arial;
    margin: 0;
}

header {
    background: #D1C4E9;
    padding: 20px;
    text-align: center;
}

.hero {
    background: #FFF9C4;
    padding: 30px;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

.product {
    border: 1px solid #ddd;
    padding: 15px;
    text-align: center;
}

.btn {
    display: inline-block;
    background: #D1C4E9;
    padding: 10px;
    text-decoration: none;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
<h1>PIPO Estudio Creativo</h1>
</header>

<section class="hero">
<h2>¡Hola, te estábamos esperando!</h2>
</section>

<div class="grid">

<div class="product">
<h3>Set ILLIT</h3>
<p>$120</p>
<a class="btn" href="#">Comprar</a>
</div>

<div class="product">
<h3>Cuadernola Stray Kids</h3>
<p>$180</p>
<a class="btn" href="#">Comprar</a>
</div>

</div>

</body>
</html>
